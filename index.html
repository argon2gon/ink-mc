<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<title>INK MC · 簡化版</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;}
html,body{margin:0;padding:0;min-height:100vh;background:#0E0B08;color:#F8EFD8;
  font-family:'Noto Sans TC',sans-serif;}
.brand{font-family:'Bebas Neue',sans-serif;color:#FF6B4A;}
input,button{font-family:inherit;}
input{background:#0E0B08;border:1px solid #2A2017;border-radius:9px;padding:11px 14px;
  color:#F2E5C4;font-size:14px;outline:none;width:100%;}
input:focus{border-color:#FF6B4A;}
button{background:#FF6B4A;color:#000;border:none;border-radius:999px;padding:14px;
  font-size:14px;font-weight:900;cursor:pointer;width:100%;}
button:hover{background:#ff7d60;}
button:disabled{opacity:.5;cursor:wait;}
.card{background:#1A1410;border:1px solid #2A2017;border-radius:18px;padding:28px;width:340px;}
.label{font-size:11px;color:#9A8978;font-weight:700;letter-spacing:.15em;
  margin-bottom:6px;display:block;}
.err{color:#FF6B4A;font-size:12px;margin-top:8px;}
.ok{color:#7BCB99;font-size:12px;margin-top:8px;}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.min.js"></script>
</head>
<body>

<div id="app" style="min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:30px;padding:20px;">
  <div style="text-align:center;">
    <span class="brand" style="font-size:48px;">INK MC</span>
    <span style="font-size:18px;font-weight:900;color:#F2E5C4;letter-spacing:.06em;margin-left:8px;">錢不漏收</span>
  </div>

  <div id="loginBox" class="card">
    <div style="font-size:11px;color:#9A8978;letter-spacing:.3em;margin-bottom:22px;font-weight:700;">刺青師 登入</div>
    <div style="margin-bottom:14px;">
      <label class="label">EMAIL</label>
      <input type="email" id="email" placeholder="your@email.com"/>
    </div>
    <div style="margin-bottom:18px;">
      <label class="label">密碼</label>
      <input type="password" id="password"/>
    </div>
    <div id="msg"></div>
    <button id="loginBtn" style="margin-top:14px;">登入後台</button>
  </div>

  <div id="successBox" class="card" style="display:none;">
    <div style="font-size:18px;font-weight:900;color:#7BCB99;margin-bottom:10px;">✅ 登入成功！</div>
    <div id="userInfo" style="font-size:13px;color:#F2E5C4;line-height:1.8;"></div>
    <button id="logoutBtn" style="margin-top:18px;background:#2A2017;color:#F2E5C4;">登出</button>
  </div>

  <div style="font-size:11px;color:#9A8978;text-align:center;max-width:340px;line-height:1.6;">
    這是簡化測試版。<br>確認登入流程能用後，會替換回完整功能版。
  </div>
</div>

<script>
const SUPA_URL  = "https://nyyaneiraagjciqksuom.supabase.co";
const SUPA_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im55eWFuZWlyYWFnamNpcWtzdW9tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0NzAzNjQsImV4cCI6MjA5MzA0NjM2NH0.HN5ArAqx1auR2oZ83I0ZOSzYQ0EQZ4s-NrT51p7YLdY";

console.log('[INK MC SIMPLE] Loading...');

const supa = supabase.createClient(SUPA_URL, SUPA_ANON);
console.log('[INK MC SIMPLE] Supabase client created');

const $ = function(id){ return document.getElementById(id); };
function setMsg(text, isErr){
  $('msg').className = isErr ? 'err' : 'ok';
  $('msg').textContent = text;
}

async function checkSession(){
  console.log('[INK MC SIMPLE] Checking session...');
  try {
    const r = await supa.auth.getUser();
    if (r.data && r.data.user) {
      console.log('[INK MC SIMPLE] Already logged in:', r.data.user.id);
      showSuccess(r.data.user, null);
    } else {
      console.log('[INK MC SIMPLE] Not logged in, showing login form');
    }
  } catch(e){
    console.error('[INK MC SIMPLE] checkSession error:', e);
  }
}

async function doLogin(){
  const email = $('email').value.trim();
  const password = $('password').value;
  if (!email || !password) {
    setMsg('請填入 Email 和密碼', true);
    return;
  }
  $('loginBtn').disabled = true;
  $('loginBtn').textContent = '登入中…';
  setMsg('', false);

  console.log('[INK MC SIMPLE] Logging in...');

  try {
    const r = await supa.auth.signInWithPassword({ email: email, password: password });
    if (r.error) {
      console.error('[INK MC SIMPLE] Login error:', r.error);
      setMsg('登入失敗：' + r.error.message, true);
      $('loginBtn').disabled = false;
      $('loginBtn').textContent = '登入後台';
      return;
    }
    console.log('[INK MC SIMPLE] Login OK:', r.data.user.id);

    try {
      const ar = await supa.from('artists').select('*').eq('id', r.data.user.id).maybeSingle();
      if (ar.error) {
        console.warn('[INK MC SIMPLE] Artist fetch error:', ar.error);
        setMsg('登入成功，但讀取資料失敗：' + ar.error.message, true);
      } else {
        console.log('[INK MC SIMPLE] Artist:', ar.data);
      }
      showSuccess(r.data.user, ar.data);
    } catch(e){
      console.error('[INK MC SIMPLE] Artist fetch threw:', e);
      showSuccess(r.data.user, null);
    }
  } catch(e){
    console.error('[INK MC SIMPLE] Login threw:', e);
    setMsg('登入發生錯誤：' + (e.message || e), true);
    $('loginBtn').disabled = false;
    $('loginBtn').textContent = '登入後台';
  }
}

function showSuccess(user, artist){
  $('loginBox').style.display = 'none';
  $('successBox').style.display = 'block';
  $('userInfo').innerHTML =
    '<strong>User ID:</strong><br>' + user.id + '<br><br>' +
    '<strong>Email:</strong><br>' + (user.email || '—') + '<br><br>' +
    '<strong>Artist Profile:</strong><br>' +
    (artist ? ('姓名 ' + (artist.name || '(空)') + '<br>工作室 ' + (artist.studio || '(空)')) : '尚未建立');
}

async function doLogout(){
  await supa.auth.signOut();
  location.reload();
}

// 綁定按鈕事件
$('loginBtn').addEventListener('click', doLogin);
$('logoutBtn').addEventListener('click', doLogout);
$('password').addEventListener('keydown', function(e){
  if (e.key === 'Enter') doLogin();
});

// 全域錯誤
window.addEventListener('error', function(e){
  console.error('[GLOBAL ERROR]', e.message);
  setMsg('JS 錯誤：' + e.message, true);
});
window.addEventListener('unhandledrejection', function(e){
  console.error('[PROMISE ERROR]', e.reason);
  setMsg('Promise 錯誤：' + (e.reason && e.reason.message ? e.reason.message : e.reason), true);
});

// Init
checkSession();
console.log('[INK MC SIMPLE] Setup complete');
</script>

</body>
</html>
